# The version of the config file. DO NOT TOUCH!!!
config_version: 1

# The name of the server for alerts, webhooks, and more. (%tg_server% placeholder)
server: Default

# The name of the root command for TotemGuard. (This requires a server restart to take effect)
commands:
  base: totemguard3
  aliases:
    - tg3

# In a multiserver setup, enabling Redis is highly recommended.
# Redis will make TotemGuard much more powerful by syncing data, alerts and more across servers.
redis:
  enabled: false
  host: localhost
  port: 6379

  # Can be left empty if no auth is required.
  username: default
  password: yourPassword

  # Alert Sync
  messaging:
    channel: totemguard
    send-alerts: true
    receive-alerts: true

# Enables the Anti-VPN Detection feature.
anti-vpn:
  # Enable VPN detection.
  enabled: true

  # The Anti VPN provider to use. (IPRisk, etc)
  provider: IPRisk

  # The API key to use for the VPN provider (can leave blank or default if the provider doesn't require one)'.
  api-key:

  # Whether to block VPN users from joining the server.
  block: true

# MySQL 8+ or MariaDB. Shared across servers; each row is tagged with
# the server name above.
database:
  enabled: false

  host: localhost
  port: 3306
  database: totemguard
  username: root
  password: password
  # Extra JDBC parameters, e.g. useSSL=false&serverTimezone=UTC
  parameters: ""

  # Only alerts and VPN cache are swept. Players, sessions, and punishments
  # are kept forever.
  retention:
    # 0 = keep forever.
    alerts-days: 0
    vpn-cache-days: 30
