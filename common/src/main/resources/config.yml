# The version of the config file. DO NOT TOUCH!!!
config_version: 1

# The name of the server for alerts, webhooks, and more. (%tg_server% placeholder)
server: Default

# The name of the root command for TotemGuard. (This requires a server restart to take effect)
commands:
  base: totemguard
  aliases:
    - tg

# MySQL 8+ or MariaDB. Shared across servers; each row is tagged with
# the server name above.
database:
  enabled: false

  host: localhost
  port: 3306
  database: TotemGuard
  username: root
  password: password
  # Extra JDBC parameters, e.g. useSSL=false&serverTimezone=UTC
  parameters: ""

  # Only alerts are swept. Players, sessions, and punishments are kept forever.
  retention:
    # 0 = keep forever.
    alerts-days: 0

# In a multiserver setup, enabling Redis is highly recommended.
# Redis will make TotemGuard much more powerful by syncing data, alerts and more across servers.
redis:
  enabled: false
  host: localhost
  port: 6379

  # Can be left empty if no auth is required.
  username: default
  password: yourPassword

  # Turn off when this server runs alone, but you still want Redis for caching
  # (violation buffers, db query results, etc.). Disabling this skips presence
  # heartbeats, cross-server alerts/monitor/follow/focus, proxy bridge wiring,
  # and the offline-grace window. Leave true on multi-server setups.
  cluster: true

  # When a player switches backends, the source server's quit
  # fires before the destination's join lands. This grace window swallows that
  # gap so transfers stay silent: no alert flicker, focus targets survive.
  # Ignored when cluster is false.
  offline-grace-millis: 4000

  # All channels are namespaced under "totemguard:". Override `alerts.channel`
  # to scope alerts to a cluster (e.g. "events" → "totemguard:events");
  # leave blank for the default "totemguard:alerts".
  # Multiple message types can use the same channel (handled by the packet id)
  messaging:
    alerts:
      channel: ""
      send: true
      receive: true

# Hides sensitive information about other players from clients so cheaters can't
# exploit it. None of these affect the receiving player's own data.
entity-spoofing:
  # Replaces the health metadata of other players with a random value in
  # [0.5, max-health] so attack-priority cheats can't read true HP. Max-health
  # is taken from the player's max-health attribute, capped at 20.
  health: true

  # Hides absorption hearts of other players by setting the absorption
  # metadata to 0.
  absorption: true

# Command run for "teleport to flagged player" actions (GUI, alert click, /tg follow).
# %tg_player% is the target. %tg_silent% appends "--silent" on internal dispatches
# (e.g. /tg follow) and is empty otherwise, only useful if your custom command
# wants to detect follow-driven calls. Example: "n tp %tg_player% %tg_silent%".
teleport:
  command: "/tg teleport %tg_player%"

tick:
  # Skip the keep-alive ordering/validation branch of TickB. Transaction and
  # teleport-confirm ordering remain checked.
  # Enable this if your server (or a plugin/proxy) modifies vanilla keep-alive
  # handling, or if TickB is flagging legitimate players on the "keepalive"
  # branch. Leave false on a stock setup.
  skip-keep-alive-validation: false

# A vanilla client bug lets you keep moving while an inventory is open when the Debug
# Modifier Key (F3) is bound to the same key as a movement key. When enabled, TotemGuard
# reads the client's keybinds on join and disconnects players whose Debug Modifier Key
# shares a key with forward, back, left, right, or jump, asking them to rebind it. This
# only catches honest clients that report their keybinds. The inventory checks
#  catch packet-level inventory cheating regardless.
debug-modifier-kick:
  enabled: true

# Just before a player is kicked or banned, show them a fake totem-pop animation
# using a player head with a hacker skin. The head is sent via packets only
# the real inventory is never touched, so nothing is lost on re-join.
ban-animation:
  enabled: true

# Periodically checks GitHub for new TotemGuard releases (every 6h).
# When Redis is enabled, results are shared across the fleet via cache + pub/sub
# so a rolling-restart fleet typically reuses the first server's fetch instead
# of all hitting GitHub.
update-checker:
  enabled: true

  # Notify players holding `TotemGuard.UpdateNotify` (defaults to ops)
  # on join when an update is available.
  notify-on-join: true

# Do not modify this list unless you know what you're doing.
developer-overrides: [ ]