# DO NOT TOUCH.
config_version: 1

# Server name for alerts and webhooks (%tg_server% placeholder).
server: Default

# Root command name (requires restart).
commands:
  base: totemguard
  aliases:
    - tg

# MySQL 8+ or MariaDB, shared across servers and tagged with the server name above.
database:
  enabled: false
  host: localhost
  port: 3306
  database: TotemGuard
  username: root
  password: password
  # Extra JDBC parameters, e.g. useSSL=false&serverTimezone=UTC
  parameters: ""
  retention:
    # Days to keep alerts. 0 = forever. Only alerts are swept.
    alerts-days: 0

# Recommended for multiserver: syncs data, alerts, and more across servers.
redis:
  enabled: false
  host: localhost
  port: 6379
  # Leave empty if no auth is required.
  username: default
  password: yourPassword
  # false = single server (Redis for caching only, skips presence, cross-server
  # alerts/monitor/follow, proxy bridge, offline-grace). Leave true on multiserver.
  cluster: true
  # Swallows the quit/join gap during a backend switch so transfers stay quiet.
  # Ignored when cluster is false.
  offline-grace-millis: 4000
  # Channels are namespaced under "totemguard:". Blank channel = "totemguard:alerts".
  messaging:
    alerts:
      channel: ""
      send: true
      receive: true

# Clients older than 1.17 cannot be tracked reliably (inventory desyncs).
# true = kick on join, false = let them play unchecked.
unsupported-client:
  kick: true

# Hides other players' sensitive data from cheat clients. Never affects your own data.
entity-spoofing:
  # Randomizes other players' health metadata so attack-priority cheats cannot read HP.
  health: true
  # Hides other players' absorption hearts.
  absorption: true

# Command for "teleport to flagged player" (GUI, alert click, /tg follow).
# %tg_player% = target, %tg_silent% = "--silent" on internal dispatches else empty.
teleport:
  command: "/tg teleport %tg_player%"

tick:
  # Skip TickB's keep-alive ordering branch (transaction/teleport ordering still checked).
  # Enable only if a plugin or proxy alters keep-alive handling.
  skip-keep-alive-validation: false

# Movement prediction engine powering the Physics check (fly, hover, speed, inventory-move).
# Everything here applies on reload, no restart needed.
physics-engine:
  # strict = tight to vanilla, recommended (a false positive is a bug, report it).
  # lenient = wider margins, only blatant cheats fire. Unknown = strict.
  preset: strict

  # Simulate players using Minecraft's own flight (creative, /fly).
  # False = a flying player is fully exempt from the engine until they stop flying.
  simulate-flying: true

  # Removes the advantage directly, riding the same trigger as the Physics flag.
  mitigation:
    # Teleport back to the last legal position. Off = flag only, no teleport.
    setback: true
    # Close the inventory on an inventory-move.
    close-inventory: true
    # Apply the fall damage a NoFall cheat dodged, through the vanilla pipeline.
    fall-damage: true
    # Drop a timer player's surplus packets at the network layer. Only when BalanceA confirms.
    timer-packet-cancel: true

  # Built-in diagnosis, applies on reload.
  # level: off = none, summary = evidence ring dumped on violation, trace = a line per tick.
  # context: extra detail blocks appended to each row, opt in only what you are debugging
  #          (e.g. [glide, water] for a glide into water). Any of land, water, lava, climb,
  #          glide, vehicle. Empty = plain rows.
  debug:
    level: off
    context: [ ]

# Kicks honest clients whose F3 Debug Modifier key collides with a movement bind
# (a vanilla bug that allows inventory-move). Packet-level cheats are caught regardless.
debug-modifier-kick:
  enabled: true

# Fake totem-pop animation before a kick or ban. Packet-only, the real inventory is untouched.
ban-animation:
  enabled: true

# Checks GitHub for new releases every 6h. Shared across the fleet when Redis is on.
update-checker:
  enabled: true
  # Notify players with `TotemGuard.UpdateNotify` (ops by default) on join.
  notify-on-join: true

# Do not modify unless you know what you're doing.
developer-overrides: [ ]
