# The version of the config file. DO NOT TOUCH!!!
config_version: 1

# The name of the server for alerts, webhooks, and more. (%tg_server% placeholder)
server: Default

# The name of the root command for TotemGuard. (This requires a server restart to take effect)
commands:
  base: totemguard3
  aliases:
    - tg3

# MySQL 8+ or MariaDB. Shared across servers; each row is tagged with
# the server name above.
database:
  enabled: false

  host: localhost
  port: 3306
  database: TotemGuard
  username: root
  password: password
  # Extra JDBC parameters, e.g. useSSL=false&serverTimezone=UTC
  parameters: ""

  # Only alerts and VPN cache are swept. Players, sessions, and punishments
  # are kept forever.
  retention:
    # 0 = keep forever.
    alerts-days: 30
    vpn-cache-days: 30

# In a multiserver setup, enabling Redis is highly recommended.
# Redis will make TotemGuard much more powerful by syncing data, alerts and more across servers.
redis:
  enabled: false
  host: localhost
  port: 6379

  # Can be left empty if no auth is required.
  username: default
  password: yourPassword

  # Alert Sync
  messaging:
    channel: totemguard
    send-alerts: true
    receive-alerts: true

# Enables the Anti-VPN Detection feature.
anti-vpn:
  # Enable VPN detection.
  enabled: false

  # The Anti VPN provider to use. (IPRisk is the only option currently)
  provider: IPRisk

  # The API key to use for the VPN provider (can leave blank or default if the provider doesn't require one)'.
  api-key:

  # Whether to block VPN users from joining the server.
  block: true

# Hides sensitive information about other players from clients so cheaters can't
# exploit it. None of these affect the receiving player's own data.
entity-spoofing:
  # Replaces the health metadata of other players with a random value in
  # [0.5, max-health] so attack-priority cheats can't read true HP. Max-health
  # is taken from the player's max-health attribute, capped at 20.
  health: true

  # Hides absorption hearts of other players by setting the absorption
  # metadata to 0.
  absorption: true

# Periodically checks GitHub for new TotemGuard releases (every 6h).
# When Redis is enabled, results are shared across the fleet via cache + pub/sub
# so a rolling-restart fleet typically reuses the first server's fetch instead
# of all hitting GitHub.
update-checker:
  enabled: true

  # Notify players holding `TotemGuardV3.UpdateNotify` (defaults to ops)
  # on join when an update is available.
  notify-on-join: true

# Do not modify this list unless you know what you're doing.
developer-overrides: []