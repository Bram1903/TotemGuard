# DO NOT TOUCH!!!
config_version: 1

kick-command: "kick %tg_player% Unfair Mod Detected: %tg_mod%"
ban-command: "ban %tg_player% Unfair Mod Detected: %tg_mod%"

# Window for KICK_THEN_BAN to escalate the next hit to a ban.
kick-then-ban-window-minutes: 30

# severity: LOG | KICK | BAN | KICK_THEN_BAN
# A payload or translation may belong to at most one mod.
mods:
  AutoTotem:
    severity: KICK_THEN_BAN
    payloads:
      - autototem

  Meteor:
    severity: KICK_THEN_BAN
    translations:
      - key.meteor-client.open-gui

  Tweakeroo:
    severity: KICK
    payloads:
      - servux:tweaks

  AccurateBlockPlacement:
    severity: KICK
    translations:
      - net.clayborn.accurateblockplacement.togglevanillaplacement
