name: TotemGuard
description: ${description}
authors:
  - Bram
  - OutDev
main: com.deathmotion.totemguard.loader.bukkit.TGLoaderBukkit
version: ${version}
api-version: '1.13'
folia-supported: true
load: POSTWORLD
depend:
  - packetevents
softdepend:
  - PlaceholderAPI
  - GrimAC
commands:
  tgloader:
    description: TotemGuard loader administration.
    usage: /tgloader <restart|start|stop|status>
    permission: totemguard.loader.admin
permissions:
  totemguard.loader.admin:
    description: Permits use of /tgloader. Not granted to operators or anyone else by default; grant explicitly.
    default: false
