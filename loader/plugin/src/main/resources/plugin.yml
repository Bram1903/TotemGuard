name: TotemGuard-Loader
description: ${description}
authors:
  - Bram
  - OutDev
main: com.deathmotion.totemguard.loader.paper.TGLoaderPaper
version: ${version}
api-version: '1.13'
folia-supported: true
load: POSTWORLD
provides:
  - TotemGuard
depend:
  - packetevents
softdepend:
  - PlaceholderAPI
  - GrimAC
  - LuckPerms
commands:
  tgloader:
    description: TotemGuard loader administration.
    usage: /tgloader <status|peers|versions|search|import|plugin|load|stage|apply|rollout>
permissions:
  totemguard.loader.admin:
    description: Permits use of /tgloader. Not granted to operators or anyone else by default. Grant explicitly.
    default: false
